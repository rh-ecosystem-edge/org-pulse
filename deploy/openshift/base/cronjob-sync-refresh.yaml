apiVersion: batch/v1
kind: CronJob
metadata:
  name: team-tracker-sync-refresh
  labels:
    app: team-tracker
    component: sync-refresh
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: team-tracker
            component: sync-refresh
        spec:
          restartPolicy: Never
          containers:
            - name: sync-refresh
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              envFrom:
                - configMapRef:
                    name: team-tracker-config
              env:
                - name: PROXY_AUTH_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: proxy-auth-secret
                      key: secret
                      optional: true
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKEND="http://backend:3001"
                  AUTH_HEADER="X-Forwarded-Email: ${CRON_ADMIN_EMAIL}"
                  PROXY_SECRET_HEADER="X-Proxy-Secret: ${PROXY_AUTH_SECRET}"

                  # Step 0: Trigger module content sync (git-static modules)
                  echo "=== Triggering module sync ==="
                  curl -sf -X POST "$BACKEND/api/admin/modules/sync" \
                    -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" || echo "Module sync skipped (no modules configured)"

                  # Step 1: Trigger unified refresh-all (cadence-aware)
                  echo "=== Triggering unified refresh-all ==="
                  REFRESH_RESP=$(curl -sf -X POST "$BACKEND/api/admin/refresh-all" \
                    -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER" \
                    -w "\n%{http_code}" 2>/dev/null) || true
                  HTTP_CODE=$(echo "$REFRESH_RESP" | tail -1)
                  BODY=$(echo "$REFRESH_RESP" | sed '$d')

                  if [ "$HTTP_CODE" = "409" ]; then
                    echo "ERROR: A refresh is already running"
                    exit 1
                  fi
                  if [ "$HTTP_CODE" != "202" ]; then
                    echo "ERROR: Unexpected response code: $HTTP_CODE"
                    exit 1
                  fi

                  # Check if any handlers are due (fast-path optimization)
                  HANDLERS_DUE=$(echo "$BODY" | grep -o '"handlersDue":[0-9]*' | grep -o '[0-9]*' || echo "")
                  echo "Refresh started (HTTP $HTTP_CODE) — handlers due: ${HANDLERS_DUE:-unknown}"

                  if [ "$HANDLERS_DUE" = "0" ]; then
                    echo "All handlers skipped by cadence — nothing to wait for"
                    echo "=== Sync and refresh completed successfully ==="
                    exit 0
                  fi

                  # Poll refresh status until complete
                  echo "=== Waiting for refresh to complete ==="
                  ATTEMPTS=0
                  MAX_ATTEMPTS=120
                  while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                    sleep 5
                    ATTEMPTS=$((ATTEMPTS + 1))
                    STATUS=$(curl -sf "$BACKEND/api/admin/refresh/status" \
                      -H "$AUTH_HEADER" -H "$PROXY_SECRET_HEADER")
                    RUNNING=$(echo "$STATUS" | grep -o '"running":true' || true)
                    if [ -z "$RUNNING" ]; then
                      echo "Refresh complete after $ATTEMPTS checks"
                      # Check for failures
                      FAILED=$(echo "$STATUS" | grep -o '"state":"failed"' | wc -l | tr -d ' ')
                      if [ "$FAILED" -gt 0 ]; then
                        echo "WARNING: $FAILED handler(s) failed (see admin UI for details)"
                      fi
                      break
                    fi
                    echo "Still refreshing... (attempt $ATTEMPTS/$MAX_ATTEMPTS)"
                  done

                  if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                    echo "WARNING: Refresh still running after polling timeout (backend will complete independently)"
                    # Exit 0 — the refresh was accepted, we just can't wait for it
                  fi

                  echo "=== Sync and refresh completed successfully ==="
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "10m"
                limits:
                  memory: "64Mi"
                  cpu: "50m"
